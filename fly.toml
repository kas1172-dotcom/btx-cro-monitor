app = "btx-platform"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[processes]
  app = "uvicorn btx_platform.asgi:app --host 0.0.0.0 --port 8000"
  worker = "celery -A btx_platform.workers.celery_app worker --loglevel=info"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
  processes = ["worker"]
