# Bakes LLM narration into frontend/data/mock/insights.json using the
# ANTHROPIC_API_KEY repo secret, then commits the result. The key never leaves
# CI and is never written to disk. Manual trigger (or run it after editing the
# mock world). The static site reads the committed insights.json.
name: Generate insights

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  insights:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate insights
        working-directory: frontend
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node tools/generate-insights.ts

      - name: Commit if changed
        run: |
          if ! git diff --quiet -- frontend/data/mock/insights.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add frontend/data/mock/insights.json
            git commit -m "chore: regenerate baked insights [skip ci]"
            git push
          else
            echo "insights.json unchanged"
          fi
