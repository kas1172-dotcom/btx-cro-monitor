# Bakes the LLM artifacts using the ANTHROPIC_API_KEY repo secret, then commits
# them. The key never leaves CI. Two artifacts:
#   - insights.json         : dossier narration (explains the deterministic output)
#   - extracted-signals.json: signals pulled from news text (the extraction layer)
# The React cockpit reads both. Manual trigger.
name: Bake LLM artifacts

on:
  workflow_dispatch: {}
  workflow_call: {}

permissions:
  contents: write

jobs:
  bake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # The tools import engine modules (validation now uses zod) — install deps.
      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Generate dossier insights
        working-directory: frontend
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node tools/generate-insights.ts

      - name: Extract signals from news
        working-directory: frontend
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node tools/extract-signals.ts

      - name: Commit if changed
        run: |
          FILES="frontend/data/mock/insights.json frontend/data/mock/extracted-signals.json"
          if ! git diff --quiet -- $FILES; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add $FILES
            git commit -m "chore: bake LLM artifacts (insights + extracted signals) [skip ci]"
            git push
          else
            echo "no changes"
          fi
