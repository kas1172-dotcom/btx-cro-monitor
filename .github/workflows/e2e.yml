name: E2E

# Browser E2E (WP10-C): builds the cockpit, boots it, and drives a real
# Chromium browser through the four core surfaces at desktop + mobile
# viewports (frontend/tools/test-e2e-playwright.ts). Separate from ci.yml
# because it installs a browser and takes longer.
#
# The Clerk sign-in step and the HubSpot task-loop tier are env-gated behind
# repo secrets a maintainer provisions (see docs/DEPLOY_BACKEND.md's CI
# section and docs/DEMO_HUBSPOT_TASK.md). Without those secrets this workflow
# still runs and passes — it exercises the app's own no-auth-configured
# fallback, matching CockpitAuthGate's behavior — it just doesn't prove the
# real Clerk flow until secrets exist.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers (with OS deps)
        run: npx playwright install --with-deps chromium

      - name: Run E2E suite
        run: npm run test:e2e
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          E2E_CLERK_EMAIL: ${{ secrets.E2E_CLERK_EMAIL }}
          E2E_CLERK_PASSWORD: ${{ secrets.E2E_CLERK_PASSWORD }}
          # HubSpot task-loop tier stays off in CI (no test-portal backend is
          # reachable from GitHub-hosted runners); enable by also setting
          # E2E_BACKEND_ENDPOINT / E2E_CLERK_SESSION_TOKEN as repo secrets
          # once a maintainer points this at a live staging backend.
          E2E_HUBSPOT_TEST_PORTAL: ${{ secrets.E2E_HUBSPOT_TEST_PORTAL }}
          E2E_BACKEND_ENDPOINT: ${{ secrets.E2E_BACKEND_ENDPOINT }}
          E2E_CLERK_SESSION_TOKEN: ${{ secrets.E2E_CLERK_SESSION_TOKEN }}

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: /tmp/btx-e2e-smoke
          retention-days: 14
