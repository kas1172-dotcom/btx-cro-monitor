name: E2E

# Browser E2E (WP10-C): optional smoke coverage that builds the cockpit, boots
# it, and drives a real Chromium browser through the four core surfaces at
# desktop + mobile viewports (frontend/tools/test-e2e-playwright.ts). Separate
# from ci.yml because it installs a browser and takes longer.
#
# E2E is skipped by default so ordinary PRs are not blocked on external auth or
# browser flake. Set repository variable RUN_E2E=1 to enable this workflow. The
# real Clerk sign-in step and HubSpot task-loop tier remain separate opt-ins.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        if: vars.RUN_E2E == '1'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        if: vars.RUN_E2E == '1'
        run: npm ci

      - name: Install Playwright browsers (with OS deps)
        if: vars.RUN_E2E == '1'
        run: npx playwright install --with-deps chromium

      - name: Run E2E suite
        if: vars.RUN_E2E == '1'
        run: npm run test:e2e
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          E2E_CLERK_EMAIL: ${{ secrets.E2E_CLERK_EMAIL }}
          E2E_CLERK_PASSWORD: ${{ secrets.E2E_CLERK_PASSWORD }}
          E2E_CLERK_LOGIN: ${{ vars.E2E_CLERK_LOGIN }}
          # HubSpot task-loop tier stays off in CI (no test-portal backend is
          # reachable from GitHub-hosted runners); enable by also setting
          # E2E_BACKEND_ENDPOINT / E2E_CLERK_SESSION_TOKEN as repo secrets
          # once a maintainer points this at a live staging backend.
          E2E_HUBSPOT_TEST_PORTAL: ${{ secrets.E2E_HUBSPOT_TEST_PORTAL }}
          E2E_BACKEND_ENDPOINT: ${{ secrets.E2E_BACKEND_ENDPOINT }}
          E2E_CLERK_SESSION_TOKEN: ${{ secrets.E2E_CLERK_SESSION_TOKEN }}

      - name: Upload screenshots
        if: always() && vars.RUN_E2E == '1'
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: /tmp/btx-e2e-smoke
          retention-days: 14

      - name: E2E skipped
        if: vars.RUN_E2E != '1'
        run: echo "E2E skipped by default. Set repository variable RUN_E2E=1 to enable browser E2E."
