name: Deploy Pages

# Publishes the committed client dashboards to GitHub Pages. Not auto-triggered:
# it runs either as the final step of the Monitor Pipeline (called via
# workflow_call after a run commits fresh artifacts) or on its own when manually
# dispatched to republish without re-running the pipeline.
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let an in-flight one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Latest tip of the ref so we publish the artifacts the pipeline just
          # committed, not the (older) dispatch SHA.
          ref: ${{ github.ref_name }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Build the Enterprise Brain demo (Vite → frontend/dist).
      - name: Build Enterprise Brain demo
        working-directory: frontend
        env:
          # Points Jarvis at the Cloudflare Worker proxy (the key lives in the
          # Worker's secret, never here). Public endpoint — safe to commit.
          VITE_COPILOT_ENDPOINT: https://btx-jarvis.kas1172.workers.dev
        run: |
          npm ci
          npm run build

      # Assemble _site/: the demo at the root URL, the Python cockpit dashboards
      # under /cockpit/. build_pages is stdlib only — no install step needed.
      - name: Assemble site
        run: |
          rm -rf _site && mkdir -p _site
          cp -r frontend/dist/. _site/
          python -m tooling.build_pages --clients-dir clients --out _site/cockpit

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages (build_type=workflow) on first run so the deploy
          # doesn't 404 when Pages hasn't been turned on in repo settings yet.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
