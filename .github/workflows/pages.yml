name: Deploy Pages

# Publishes the committed client dashboards to GitHub Pages. Not auto-triggered:
# it runs either as the final step of the Monitor Pipeline (called via
# workflow_call after a run commits fresh artifacts) or on its own when manually
# dispatched to republish without re-running the pipeline.
on:
  workflow_call:
    secrets:
      VITE_BACKEND_ENDPOINT:
        required: true
      VITE_BACKEND_AUTH_TOKEN:
        required: true
      VITE_COCKPIT_PASSWORD:
        required: true
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let an in-flight one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Latest tip of the ref so we publish the artifacts the pipeline just
          # committed, not the (older) dispatch SHA.
          ref: ${{ github.ref_name }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Build the Enterprise Brain cockpit (Vite → frontend/dist).
      - name: Build Enterprise Brain cockpit
        working-directory: frontend
        env:
          VITE_DATA_MODE: hybrid
          VITE_BACKEND_ENDPOINT: ${{ secrets.VITE_BACKEND_ENDPOINT }}
          VITE_BACKEND_AUTH_TOKEN: ${{ secrets.VITE_BACKEND_AUTH_TOKEN }}
          VITE_COPILOT_ENDPOINT: ${{ secrets.VITE_BACKEND_ENDPOINT }}/llm
          VITE_ARTIFACT_BASE_URL: ../btx
          COCKPIT_PASSWORD: ${{ secrets.VITE_COCKPIT_PASSWORD }}
        run: |
          if [ -z "$VITE_BACKEND_ENDPOINT" ] || [ -z "$VITE_BACKEND_AUTH_TOKEN" ] || [ -z "$COCKPIT_PASSWORD" ]; then
            echo "::error::Missing one or more frontend deploy secrets: VITE_BACKEND_ENDPOINT, VITE_BACKEND_AUTH_TOKEN, VITE_COCKPIT_PASSWORD"
            exit 1
          fi
          export VITE_COCKPIT_PASSWORD_HASH="$(printf '%s' "$COCKPIT_PASSWORD" | sha256sum | awk '{print $1}')"
          npm ci
          npm run build

      # Assemble _site/: the cockpit under /cockpit/ and BTX artifacts under
      # /btx/ so hybrid/artifact modes can fetch monitor output at runtime.
      - name: Assemble site
        run: |
          rm -rf _site && mkdir -p _site/cockpit _site/btx
          cp -r frontend/dist/. _site/cockpit/
          mkdir -p _site/btx
          cp -r clients/btx/artifacts/. _site/btx/
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>BTX CRO Monitor</title>
              <style>
                body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #172033; background: #f6f7f9; }
                main { max-width: 760px; margin: 14vh auto; padding: 0 24px; }
                h1 { font-size: clamp(2rem, 6vw, 4rem); line-height: 1; margin: 0 0 16px; }
                p { color: #526071; font-size: 1.05rem; line-height: 1.6; }
                nav { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 28px; }
                a { border: 1px solid #cdd5df; border-radius: 8px; color: #172033; padding: 12px 16px; text-decoration: none; background: #fff; }
                a:first-child { background: #172033; border-color: #172033; color: #fff; }
              </style>
            </head>
            <body>
              <main>
                <h1>BTX CRO Monitor</h1>
                <p>The current defense monitor brief and the live backend-connected cockpit are published from this repository.</p>
                <nav aria-label="BTX pages">
                  <a href="./cockpit/">Open cockpit</a>
                  <a href="./btx/">Open brief</a>
                </nav>
              </main>
            </body>
          </html>
          HTML

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages (build_type=workflow) on first run so the deploy
          # doesn't 404 when Pages hasn't been turned on in repo settings yet.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
