name: Deploy Pages

# Reusable Pages-publish step, not a standalone button. It is called by three
# workflows depending on what triggered the publish:
#   - "Update demo (bake + deploy)" — the one-button full refresh
#   - "Deploy Frontend Cockpit"     — redeploy the built frontend only, no rebake
#   - "Monitor Pipeline"            — final step after a fresh artifact run
# To manually republish without re-running any of those, use "Deploy Frontend
# Cockpit" from the Actions tab — not this workflow directly.
on:
  workflow_call:
    secrets:
      VITE_BACKEND_ENDPOINT:
        required: true
      VITE_COCKPIT_PASSWORD:
        required: true
      VITE_CLERK_PUBLISHABLE_KEY:
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let an in-flight one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Latest tip of the ref so we publish the artifacts the pipeline just
          # committed, not the (older) dispatch SHA.
          ref: ${{ github.ref_name }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Build the Enterprise Brain cockpit (Vite → frontend/dist).
      - name: Build Enterprise Brain cockpit
        working-directory: frontend
        env:
          VITE_DATA_MODE: hybrid
          VITE_BACKEND_ENDPOINT: ${{ secrets.VITE_BACKEND_ENDPOINT }}
          VITE_COPILOT_ENDPOINT: ${{ secrets.VITE_BACKEND_ENDPOINT }}/llm
          VITE_ARTIFACT_BASE_URL: ../btx
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          COCKPIT_PASSWORD: ${{ secrets.VITE_COCKPIT_PASSWORD }}
        run: |
          if [ -z "$VITE_BACKEND_ENDPOINT" ] || [ -z "$COCKPIT_PASSWORD" ] || [ -z "$VITE_CLERK_PUBLISHABLE_KEY" ]; then
            echo "::error::Missing one or more frontend deploy secrets: VITE_BACKEND_ENDPOINT, VITE_COCKPIT_PASSWORD, VITE_CLERK_PUBLISHABLE_KEY"
            exit 1
          fi
          export VITE_COCKPIT_PASSWORD_HASH="$(printf '%s' "$COCKPIT_PASSWORD" | sha256sum | awk '{print $1}')"
          npm ci
          npm run build

      # Assemble _site/: the cockpit under /cockpit/ and selected BTX JSON
      # artifacts under /btx/ so hybrid/artifact modes can fetch monitor output
      # at runtime. The retired Python static brief/map HTML is not published.
      - name: Assemble site
        run: |
          rm -rf _site && mkdir -p _site/cockpit _site/btx
          cp -r frontend/dist/. _site/cockpit/
          for artifact in run_output.json archive.json map_targets.json; do
            test -f "clients/btx/artifacts/$artifact"
            cp "clients/btx/artifacts/$artifact" "_site/btx/$artifact"
          done
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>BTX CRO Monitor</title>
              <style>
                body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #172033; background: #f6f7f9; }
                main { max-width: 760px; margin: 14vh auto; padding: 0 24px; }
                h1 { font-size: clamp(2rem, 6vw, 4rem); line-height: 1; margin: 0 0 16px; }
                p { color: #526071; font-size: 1.05rem; line-height: 1.6; }
                nav { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 28px; }
                a { border: 1px solid #cdd5df; border-radius: 8px; color: #172033; padding: 12px 16px; text-decoration: none; background: #fff; }
                a:first-child { background: #172033; border-color: #172033; color: #fff; }
              </style>
            </head>
            <body>
              <main>
                <h1>BTX CRO Monitor</h1>
                <p>The live backend-connected cockpit is published from this repository. Monitor JSON artifacts are available under <code>/btx/</code> for the cockpit.</p>
                <nav aria-label="BTX pages">
                  <a href="./cockpit/">Open cockpit</a>
                  <a href="./btx/run_output.json">View monitor JSON</a>
                </nav>
              </main>
            </body>
          </html>
          HTML

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages (build_type=workflow) on first run so the deploy
          # doesn't 404 when Pages hasn't been turned on in repo settings yet.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
