name: CI

# Gates every PR into main: frontend typecheck/build/test suites + backend
# pytest. No network/paid API calls — Anthropic-backed test paths are mocked
# (see tools/test-*.ts and tests/test_*.py). Configure this as a required
# status check under Settings -> Branches -> Branch protection rules for main.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: test:metrics
        run: npm run test:metrics

      - name: test:rail
        run: npm run test:rail

      - name: test:settings
        run: npm run test:settings

      - name: test:flows
        run: npm run test:flows

      - name: test:tour
        run: npm run test:tour

      - name: test:phase0
        run: npm run test:phase0

      - name: test:identity
        run: npm run test:identity

      - name: test:map
        run: npm run test:map

      - name: test:live-adapter
        run: npm run test:live-adapter

      - name: test:deliverables
        run: npm run test:deliverables

  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install engine + platform
        run: pip install -e ".[dev,platform]"

      - name: pytest
        run: python3 -m pytest -q
