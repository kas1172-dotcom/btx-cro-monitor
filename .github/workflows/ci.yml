name: 01 CI

# Gates every PR into main: frontend typecheck/build/test suites, backend
# pytest, and an optional browser E2E smoke job. No network/paid API calls are
# made by the default jobs; Anthropic-backed test paths are mocked.
#
# Browser E2E is skipped by default. Set repository variable RUN_E2E=1 to enable
# it; this keeps ordinary PRs fast while preserving a single CI workflow in the
# Actions tab.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: test:metrics
        run: npm run test:metrics

      - name: test:rail
        run: npm run test:rail

      - name: test:settings
        run: npm run test:settings

      - name: test:flows
        run: npm run test:flows

      - name: test:tour
        run: npm run test:tour

      - name: test:phase0
        run: npm run test:phase0

      - name: test:identity
        run: npm run test:identity

      - name: test:map
        run: npm run test:map

      - name: test:live-adapter
        run: npm run test:live-adapter

      - name: test:deliverables
        run: npm run test:deliverables

      - name: test:deliverable-library
        run: npm run test:deliverable-library

      - name: test:wizard
        run: npm run test:wizard

      - name: test:hubspot-viewer
        run: npm run test:hubspot-viewer

      - name: test:import-list
        run: npm run test:import-list

  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install engine + platform
        run: pip install -e ".[dev,platform]"

      - name: pytest
        run: python3 -m pytest -q

  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        if: vars.RUN_E2E == '1'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        if: vars.RUN_E2E == '1'
        run: npm ci

      - name: Install Playwright browsers
        if: vars.RUN_E2E == '1'
        run: npx playwright install --with-deps chromium

      - name: Run E2E suite
        if: vars.RUN_E2E == '1'
        run: npm run test:e2e
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          E2E_CLERK_EMAIL: ${{ secrets.E2E_CLERK_EMAIL }}
          E2E_CLERK_PASSWORD: ${{ secrets.E2E_CLERK_PASSWORD }}
          E2E_CLERK_LOGIN: ${{ vars.E2E_CLERK_LOGIN }}
          E2E_HUBSPOT_TEST_PORTAL: ${{ secrets.E2E_HUBSPOT_TEST_PORTAL }}
          E2E_BACKEND_ENDPOINT: ${{ secrets.E2E_BACKEND_ENDPOINT }}
          E2E_CLERK_SESSION_TOKEN: ${{ secrets.E2E_CLERK_SESSION_TOKEN }}

      - name: Upload screenshots
        if: always() && vars.RUN_E2E == '1'
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: /tmp/btx-e2e-smoke
          retention-days: 14

      - name: E2E skipped
        if: vars.RUN_E2E != '1'
        run: echo "E2E skipped by default. Set repository variable RUN_E2E=1 to enable browser E2E."
