name: Bake LLM artifacts
description: Generate and commit the baked frontend LLM artifacts.

inputs:
  anthropic_api_key:
    description: Anthropic API key used by the generation scripts.
    required: true

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Install deps
      working-directory: frontend
      shell: bash
      run: npm ci

    - name: Generate dossier insights
      working-directory: frontend
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
      run: node tools/generate-insights.ts

    - name: Extract signals from news
      working-directory: frontend
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
      run: node tools/extract-signals.ts

    - name: Commit if changed
      shell: bash
      run: |
        FILES="frontend/data/mock/insights.json frontend/data/mock/extracted-signals.json"
        if ! git diff --quiet -- $FILES; then
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add $FILES
          git commit -m "chore: bake LLM artifacts (insights + extracted signals) [skip ci]"
          git push
        else
          echo "no changes"
        fi
