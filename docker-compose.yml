# Local infra for the integration platform (Engine #1).
# Brings up Postgres + Redis; run the API/worker from your shell against them.
# (A Dockerfile for the app images lands with the Phase 2 worker.)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: btx
      POSTGRES_PASSWORD: btx
      POSTGRES_DB: btx
    ports: ["5432:5432"]
    volumes: ["btx_pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U btx"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  btx_pgdata:
